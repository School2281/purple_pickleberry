# fractal_server.conf - NGINX configuration with dynamic limits

# Dynamic rate limiting based on request type AND iteration count
map $arg_iter $fractal_rate {
    default               5r/m;      # Default for fractal (5 per minute)
    ~^[0-9]{1,2}$        30r/m;      # 1-99 iterations: moderate (30 per minute)
    ~^[0-9]{3}$          6r/m;       # 100-999 iterations: slow (6 per minute = 1 per 10s)
    ~^[0-9]{4,}$         2r/m;       # 1000+ iterations: very slow (2 per minute = 1 per 30s)
    ""                    5r/m;       # No iter parameter
}

# Main rate limit map
map $request_uri $rate_limit {
    default               $fractal_rate;  # Use iteration-based rate for fractal
    ~^/light              20r/s;           # Light testing - very fast
    ~^/viewer             10r/s;           # Viewer page - fast
    ~^/status             30r/m;           # Status - moderate
}

# Dynamic connection limits
map $request_uri $conn_limit {
    default               2;
    ~^/light              10;
    ~^/viewer             5;
    ~^/status             3;
}

# Rate limit zones using dynamic rates
limit_req_zone $binary_remote_addr zone=dynamic:10m rate=$rate_limit;
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 80;
    server_name _;
    
    # Access logs
    access_log /var/log/nginx/fractal_access.log;
    error_log /var/log/nginx/fractal_error.log;
    
    # Timeouts
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 10s;
    
    # Request limits
    client_max_body_size 1k;
    
    # Viewer page
    location /viewer {
        # Apply rate limits
        limit_req zone=dynamic burst=20 nodelay;
        limit_conn addr 5;
        
        proxy_pass http://127.0.0.1:5000/viewer;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Short timeout
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
        proxy_send_timeout 5s;
    }
    
    # Light endpoint
    location /light {
        # Apply rate limits
        limit_req zone=dynamic burst=50 nodelay;
        limit_conn addr 10;
        
        proxy_pass http://127.0.0.1:5000/light;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Quick timeouts
        proxy_connect_timeout 2s;
        proxy_read_timeout 10s;
        proxy_send_timeout 5s;
    }
    
    # Fractal endpoint with iteration-based dynamic limits
    location /fractal {
        # Apply dynamic rate limits (based on iter value)
        limit_req zone=dynamic burst=3 nodelay;
        limit_conn addr $conn_limit;
        
        # Add headers to show limits
        add_header X-RateLimit-Limit "$rate_limit";
        add_header X-RateLimit-Iterations "$arg_iter";
        
        # Proxy to Flask
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Timeouts
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }
    
    # Status endpoint
    location /status {
        # Apply rate limits
        limit_req zone=dynamic burst=5 nodelay;
        limit_conn addr 3;
        
        proxy_pass http://127.0.0.1:5000/status;
        proxy_set_header Host $host;
        
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
        proxy_send_timeout 5s;
    }
    
    # Static files (fallback)
    location / {
        root /var/www/html;
        try_files $uri $uri/ =404;
        expires 1h;
        
        # No rate limits for static files
    }
}
