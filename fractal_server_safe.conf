# fractal_server.conf - Simple IP-based rate limiting

# Rate limit zones
limit_req_zone $binary_remote_addr zone=fractal_limit:10m rate=2r/m;
limit_conn_zone $binary_remote_addr zone=addr_limit:10m;

server {
    listen 80;
    server_name _;
    
    # Access logs
    access_log /var/log/nginx/fractal_access.log;
    error_log /var/log/nginx/fractal_error.log;
    
    # Timeouts
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 10s;
    
    # Request limits
    client_max_body_size 1k;
    
    # Viewer page (no limits)
    location /viewer {
        proxy_pass http://127.0.0.1:5000/viewer;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # Light endpoint (no limits)
    location /light {
        proxy_pass http://127.0.0.1:5000/light;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # Fractal endpoint with IP-based rate limiting
    location /fractal {
        # 2 requests per minute per IP, burst of 1
        limit_req zone=fractal_limit burst=1 nodelay;
        # Max 1 concurrent connection per IP
        limit_conn addr_limit 1;
        
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Timeouts
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }
    
    # Status endpoint (no limits)
    location /status {
        proxy_pass http://127.0.0.1:5000/status;
        proxy_set_header Host $host;
        proxy_read_timeout 5s;
    }
    
    # Static files
    location / {
        root /var/www/html;
        try_files $uri $uri/ =404;
        expires 1h;
    }
}
