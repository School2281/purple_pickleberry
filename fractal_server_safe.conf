# fractal_server.conf - Simple IP-based rate limiting with viewer exception

# Rate limit zones
limit_req_zone $binary_remote_addr zone=normal_fractal:10m rate=2r/m;
limit_req_zone $binary_remote_addr zone=viewer_fractal:10m rate=200r/m;
limit_conn_zone $binary_remote_addr zone=addr_limit:10m;

server {
    listen 80;
    server_name _;
    
    # Access logs
    access_log /var/log/nginx/fractal_access.log;
    error_log /var/log/nginx/fractal_error.log;
    
    # Timeouts
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 10s;
    
    # Request limits
    client_max_body_size 1k;
    
    # Viewer page (no limits)
    location /viewer {
        proxy_pass http://127.0.0.1:5000/viewer;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # Light endpoint (no limits)
    location /light {
        proxy_pass http://127.0.0.1:5000/light;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # Fractal endpoint - STRICT for normal use (2 per minute)
    location /fractal {
        # Strict rate limit
        limit_req zone=normal_fractal burst=1 nodelay;
        limit_req_status 429;
        limit_conn addr_limit 1;
        
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Timeouts
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }
    
    # Special endpoint for the viewer (30 per minute)
    location /fractal_viewer {
        # More generous rate limit
        limit_req zone=viewer_fractal burst=5 nodelay;
        limit_req_status 429;
        limit_conn addr_limit 2;
        
        proxy_pass http://127.0.0.1:5000/fractal;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Timeouts
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }
    
    # Status endpoint (no limits)
    location /status {
        proxy_pass http://127.0.0.1:5000/status;
        proxy_set_header Host $host;
        proxy_read_timeout 5s;
    }
    
    # Static files
    location / {
        root /var/www/html;
        try_files $uri $uri/ =404;
        expires 1h;
    }
}
